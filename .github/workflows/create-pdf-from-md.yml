name: Markdown to PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'pms/**/*.md'
      - 'pms/images/**'
      - 'pms-sonstige/**/*.md'
      - 'images/**'
      - '.github/workflows/create-pdf-from-md.yml'
  release:
    types: [published]

jobs:
  topdf-with-image:
    name: Markdown zu PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ausgabeordner anlegen
        run: mkdir -p pdfs-pms pdfs-sonstige

      - name: Markdown nach PDF (pms)
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: pms
          output_dir: pdfs-pms
          images_dir: images
          image_import: ./images
          build_html: false

      - name: Markdown nach PDF (pms-sonstige)
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: pms-sonstige
          output_dir: pdfs-sonstige
          images_dir: images
          image_import: ./images
          build_html: false

      - name: Gefundene Dateien anzeigen
        run: |
          echo "PDF-Dateien gefunden:"
          find pdfs-pms pdfs-sonstige -type f -name "*.pdf" | sort

      - name: Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: alle-pdfs
          path: |
            pdfs-pms/**/*.pdf
            pdfs-sonstige/**/*.pdf
          if-no-files-found: error