name: Markdown to PDF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'pms/**/*.md'
      - 'pms/images/**'
      - 'sonstige/**/*.md'
      - 'images/**'
      - '.github/workflows/create-pdf-from-md.yml'
  release:
    types: [published]

jobs:
  topdf-with-image:
    name: Markdown zu PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          python3 -m pip install --user weasyprint

      - name: Markdown nach PDF umwandeln
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          from datetime import datetime, timezone

          repo = Path.cwd()
          source_dirs = [repo / 'pms', repo / 'sonstige']
          output_dir = repo / 'generated'
          output_dir.mkdir(exist_ok=True)
          short_sha = os.environ.get('GITHUB_SHA', '').strip()[:7] or 'local'
          timestamp = datetime.now(timezone.utc).strftime('%Y%m%d-%H%M%S')

          for src_dir in source_dirs:
              if not src_dir.exists():
                  continue
              for md_file in sorted(src_dir.rglob('*.md')):
                  target_name = f"{md_file.stem}-{timestamp}-{short_sha}.pdf"
                  target = output_dir / target_name
                  temp_md = md_file.with_suffix('.tmp.md')
                  content = md_file.read_text(encoding='utf-8')
                  content = content.replace('../images/52n13e.png', str(repo / 'images' / '52n13e.png').replace(str(repo), '.'))
                  temp_md.write_text(content, encoding='utf-8')

                  cmd = [
                      'pandoc',
                      str(temp_md),
                      '-o',
                      str(target),
                      '--standalone',
                      '--embed-resources',
                      '--pdf-engine=weasyprint',
                      '--resource-path',
                      f'{src_dir}:{repo / "images"}:{repo}',
                  ]
                  print('Konvertiere', md_file, '->', target)
                  subprocess.run(cmd, check=True, cwd=repo)
                  temp_md.unlink(missing_ok=True)
          PY

      - name: Gefundene Dateien anzeigen
        run: |
          echo "PDF-Dateien gefunden:"
          find generated -type f -name "*.pdf" | sort

      - name: Änderungen in Git committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin generated-pdfs || true
          git checkout -B generated-pdfs origin/generated-pdfs || git checkout -B generated-pdfs
          find generated -type f -name "*.pdf" -exec git add {} +
          if git diff --cached --quiet; then
            echo "Keine neuen PDF-Dateien zum Committen."
          else
            git commit -m "chore: update generated PDFs [skip ci]"
            git push origin generated-pdfs --force-with-lease
          fi

      - name: Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: alle-pdfs
          path: |
            generated/**/*.pdf
          if-no-files-found: error